name: Deploy telegram-echo-bot (secondary)

# @Glabalashganbot bilan parallel — ikkinchi Telegram bot (alohida Worker).
# GitHub Secrets (repoga YOZMAYDI):
#   TELEGRAM_ECHO_BOT_TOKEN_2
#   TELEGRAM_ECHO_WEBHOOK_SECRET_2  (masalan: tg_8835962050_echo)
# Qo'llanma: node scripts/setup-echo-bot-2-secrets.mjs

on:
  push:
    branches: [main]
    paths:
      - "ish/echo-bot/**"
      - ".github/workflows/deploy-echo-bot-secondary.yml"
      - "scripts/setup-echo-bot-2-secrets.mjs"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ish/echo-bot
    env:
      WORKER_NAME: telegram-echo-bot-2
      WORKER_URL: https://telegram-echo-bot-2.fxjournaluz.workers.dev
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ish/echo-bot/package-lock.json

      - name: Validate secondary bot token
        id: gate
        env:
          TELEGRAM_ECHO_BOT_TOKEN_2: ${{ secrets.TELEGRAM_ECHO_BOT_TOKEN_2 }}
        run: |
          if [ -z "$TELEGRAM_ECHO_BOT_TOKEN_2" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::warning::TELEGRAM_ECHO_BOT_TOKEN_2 GitHub Secrets da yo'q — ikkinchi bot deploy o'tkazildi"
            echo "::warning::Qo'llanma: node scripts/setup-echo-bot-2-secrets.mjs"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Secondary bot token topildi."
          fi

      - name: Install dependencies
        if: steps.gate.outputs.skip != 'true'
        run: npm ci

      - name: Validate Cloudflare credentials
        if: steps.gate.outputs.skip != 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::GitHub Secrets kerak: CLOUDFLARE_API_TOKEN va CLOUDFLARE_ACCOUNT_ID"
            exit 1
          fi

      - name: Ensure separate KV namespace
        if: steps.gate.outputs.skip != 'true'
        id: kv
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          TITLE="telegram-echo-bot-2-CHAT_HISTORY"
          KV_ID=$(npx wrangler kv namespace list --json | jq -r --arg t "$TITLE" '.[] | select(.title == $t) | .id' | head -1)
          if [ -z "$KV_ID" ] || [ "$KV_ID" = "null" ]; then
            echo "Creating KV namespace: $TITLE"
            KV_ID=$(npx wrangler kv namespace create "$TITLE" --json | jq -r '.id')
          fi
          echo "kv_id=$KV_ID" >> "$GITHUB_OUTPUT"
          echo "KV namespace: $KV_ID"

      - name: Sync Worker secrets (secondary)
        if: steps.gate.outputs.skip != 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TELEGRAM_ECHO_BOT_TOKEN_2: ${{ secrets.TELEGRAM_ECHO_BOT_TOKEN_2 }}
          TELEGRAM_ECHO_WEBHOOK_SECRET_2: ${{ secrets.TELEGRAM_ECHO_WEBHOOK_SECRET_2 }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          sync_secret() {
            local name="$1"
            local value="$2"
            if [ -n "$value" ]; then
              echo "$value" | npx wrangler secret put "$name" --name "$WORKER_NAME"
            else
              echo "::warning::Secret $name yo'q — o'tkazib yuborildi"
            fi
          }
          sync_secret TELEGRAM_BOT_TOKEN "$TELEGRAM_ECHO_BOT_TOKEN_2"
          WEBHOOK_SECRET="${TELEGRAM_ECHO_WEBHOOK_SECRET_2:-tg_8835962050_echo}"
          sync_secret TELEGRAM_WEBHOOK_SECRET "$WEBHOOK_SECRET"
          sync_secret GEMINI_API_KEY "$GEMINI_API_KEY"

      - name: Deploy secondary Worker
        if: steps.gate.outputs.skip != 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          KV_ID: ${{ steps.kv.outputs.kv_id }}
        run: |
          # Birinchi bot tokenlari vars sifatida ikkinchi workerga tushmasin
          jq \
            --arg name "$WORKER_NAME" \
            --arg url "$WORKER_URL" \
            --arg kv "$KV_ID" \
            '
              .name = $name
              | .vars.WORKER_PUBLIC_URL = $url
              | .vars.TELEGRAM_BOT_TOKEN = "via-secret"
              | .vars.TELEGRAM_WEBHOOK_SECRET = "via-secret"
              | del(.vars.GEMINI_API_KEY_B64)
              | .kv_namespaces = [{ "binding": "CHAT_HISTORY", "id": $kv }]
            ' wrangler.jsonc > wrangler.secondary.jsonc

          npx wrangler deploy --config wrangler.secondary.jsonc

      - name: Setup webhook and menu
        if: steps.gate.outputs.skip != 'true'
        env:
          TELEGRAM_ECHO_WEBHOOK_SECRET_2: ${{ secrets.TELEGRAM_ECHO_WEBHOOK_SECRET_2 }}
        run: |
          KEY="${TELEGRAM_ECHO_WEBHOOK_SECRET_2:-tg_8835962050_echo}"
          curl -sf "${WORKER_URL}/admin/setup-webhook?key=${KEY}"
          echo ""
          curl -sf "${WORKER_URL}/health"
          echo ""
