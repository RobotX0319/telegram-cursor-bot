name: Deploy telegram-echo-bot (secondary)

# @Glabalashganbot bilan parallel — mustaqil Worker (telegram-echo-bot-2).
# Token va Gemini kaliti: scripts/echo-bot-2/vars.jsonc (repoda).
# Cursor agent tokenlari ISHLATILMAYDI — faqat Telegram + Gemini.

on:
  push:
    branches: [main]
    paths:
      - "ish/echo-bot/**"
      - "scripts/echo-bot-2/**"
      - ".github/workflows/deploy-echo-bot-secondary.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ish/echo-bot
    env:
      WORKER_NAME: telegram-echo-bot-2
      WORKER_URL: https://telegram-echo-bot-2.fxjournaluz.workers.dev
      VARS_FILE: ../../scripts/echo-bot-2/vars.jsonc
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ish/echo-bot/package-lock.json

      - name: Validate repo config
        run: |
          if [ ! -f "$VARS_FILE" ]; then
            echo "::error::scripts/echo-bot-2/vars.jsonc topilmadi"
            exit 1
          fi
          TOKEN=$(jq -r '.TELEGRAM_BOT_TOKEN // empty' "$VARS_FILE")
          if [ -z "$TOKEN" ]; then
            echo "::error::TELEGRAM_BOT_TOKEN vars.jsonc da yo'q"
            exit 1
          fi
          echo "Ikkinchi bot konfiguratsiyasi topildi."

      - name: Install dependencies
        run: npm ci

      - name: Validate Cloudflare credentials
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::GitHub Secrets kerak: CLOUDFLARE_API_TOKEN va CLOUDFLARE_ACCOUNT_ID"
            exit 1
          fi

      - name: Ensure separate KV namespace
        id: kv
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          TITLE="telegram-echo-bot-2-CHAT_HISTORY"
          PRESET=$(jq -r '.CHAT_HISTORY_KV_ID // empty' "$VARS_FILE")
          if [ -n "$PRESET" ]; then
            echo "kv_id=$PRESET" >> "$GITHUB_OUTPUT"
            echo "KV namespace (repo): $PRESET"
            exit 0
          fi

          KV_ID=""
          LIST_JSON=$(npx wrangler kv namespace list 2>/dev/null || echo "[]")
          KV_ID=$(echo "$LIST_JSON" | jq -r --arg t "$TITLE" '.[]? | select(.title == $t) | .id' | head -1)

          if [ -z "$KV_ID" ] || [ "$KV_ID" = "null" ]; then
            echo "Creating KV namespace: $TITLE"
            CREATE_OUT=$(npx wrangler kv namespace create "$TITLE" 2>&1) || true
            echo "$CREATE_OUT"
            KV_ID=$(echo "$CREATE_OUT" | grep -oE 'id = "[a-f0-9]+"' | sed 's/id = "//;s/"//' | head -1)
            if [ -z "$KV_ID" ]; then
              KV_ID=$(echo "$CREATE_OUT" | jq -r '.id // empty' 2>/dev/null || true)
            fi
          fi

          if [ -z "$KV_ID" ]; then
            echo "::warning::KV yaratib bo'lmadi — bot ishlaydi, lekin suhbat tarixi saqlanmaydi"
            echo "kv_id=" >> "$GITHUB_OUTPUT"
          else
            echo "kv_id=$KV_ID" >> "$GITHUB_OUTPUT"
            echo "KV namespace: $KV_ID"
          fi

      - name: Deploy secondary Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          KV_ID: ${{ steps.kv.outputs.kv_id }}
        run: |
          BOT_TOKEN=$(jq -r '.TELEGRAM_BOT_TOKEN' "$VARS_FILE")
          WEBHOOK_SECRET=$(jq -r '.TELEGRAM_WEBHOOK_SECRET' "$VARS_FILE")
          GEMINI_B64=$(jq -r '.GEMINI_API_KEY_B64 // empty' "$VARS_FILE")

          if [ -n "$KV_ID" ]; then
            jq \
              --arg name "$WORKER_NAME" \
              --arg url "$WORKER_URL" \
              --arg kv "$KV_ID" \
              --arg token "$BOT_TOKEN" \
              --arg webhook "$WEBHOOK_SECRET" \
              --arg gemini "$GEMINI_B64" \
              '
                .name = $name
                | .vars.WORKER_PUBLIC_URL = $url
                | .vars.TELEGRAM_BOT_TOKEN = $token
                | .vars.TELEGRAM_WEBHOOK_SECRET = $webhook
                | .vars.GEMINI_API_KEY_B64 = $gemini
                | .kv_namespaces = [{ "binding": "CHAT_HISTORY", "id": $kv }]
              ' wrangler.jsonc > wrangler.secondary.jsonc
          else
            jq \
              --arg name "$WORKER_NAME" \
              --arg url "$WORKER_URL" \
              --arg token "$BOT_TOKEN" \
              --arg webhook "$WEBHOOK_SECRET" \
              --arg gemini "$GEMINI_B64" \
              '
                .name = $name
                | .vars.WORKER_PUBLIC_URL = $url
                | .vars.TELEGRAM_BOT_TOKEN = $token
                | .vars.TELEGRAM_WEBHOOK_SECRET = $webhook
                | .vars.GEMINI_API_KEY_B64 = $gemini
                | .kv_namespaces = []
              ' wrangler.jsonc > wrangler.secondary.jsonc
          fi

          npx wrangler deploy --config wrangler.secondary.jsonc

      - name: Setup webhook and menu
        run: |
          KEY=$(jq -r '.TELEGRAM_WEBHOOK_SECRET' "$VARS_FILE")
          curl -sf "${WORKER_URL}/admin/setup-webhook?key=${KEY}"
          echo ""
          curl -sf "${WORKER_URL}/health"
          echo ""
