name: Poll pending agent runs

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Check pending runs
        run: |
          curl -sf \
            "https://telegram-cursor-bot.fxjournaluz.workers.dev/admin/poll-pending?key=${{ secrets.TELEGRAM_WEBHOOK_SECRET }}"
