name: Deploy telegram-cursor-bot

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "scripts/**"
      - "wrangler.jsonc"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - ".github/workflows/deploy-cursor-bot.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Cloudflare credentials
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "::error::GitHub Secrets kerak: CLOUDFLARE_API_TOKEN va CLOUDFLARE_ACCOUNT_ID"
            exit 1
          fi
          echo "Cloudflare credentials found."

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Setup webhook (ixtiyoriy)
        continue-on-error: true
        env:
          WEBHOOK_SECRET: ${{ secrets.TELEGRAM_WEBHOOK_SECRET }}
        run: |
          if [ -n "$WEBHOOK_SECRET" ]; then
            curl -sf \
              "https://telegram-cursor-bot.fxjournaluz.workers.dev/admin/setup-webhook?key=${WEBHOOK_SECRET}" \
              || echo "Webhook setup skipped (admin key mismatch or secret not in GitHub)."
          else
            echo "TELEGRAM_WEBHOOK_SECRET GitHub da yo'q — webhook o'tkazib yuborildi (Cloudflare secretlari saqlanadi)."
          fi
